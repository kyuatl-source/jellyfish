<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jellyhooish</title>
<style>
  :root {
    --paper: #f4f2ed;
    --ink: #141413;
    --white: #fff;
    --yellow: #f4e000;
    --green: #00e65c;
    --blue: #0037ff;
    --red: #ff3b30;
    --gray: #999;
    --light-gray: #e0ded8;
    --dark-overlay: rgba(10,10,8,.94);
    --sans: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Menlo", monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    cursor: none;
    overflow-x: hidden;
  }
  @media (pointer: coarse) {
    body { cursor: auto }
    .cursor-dot { display: none }
  }

  .cursor-dot {
    position: fixed; z-index: 10001;
    width: 10px; height: 10px;
    background: var(--ink);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width .15s, height .15s, background .15s;
    mix-blend-mode: difference;
  }
  .cursor-dot.hover-card { width: 28px; height: 28px; background: var(--yellow); mix-blend-mode: normal; }
  .cursor-dot.hover-nav { width: 6px; height: 6px; background: var(--white); mix-blend-mode: normal; }

  .watermark {
    position: fixed; bottom: -6vh; left: -2vw; z-index: 0;
    font-family: var(--sans); font-size: 18vw; font-weight: 900;
    color: #e8e5dd; letter-spacing: -0.04em; line-height: .85;
    pointer-events: none; user-select: none;
    white-space: nowrap;
    transition: transform .6s cubic-bezier(.16,1,.3,1);
  }

  .top-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px;
    background: var(--ink);
    color: var(--white);
    font-size: 13px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
  }
  .top-nav .nav-left { display: flex; gap: 24px; }
  .top-nav .nav-item { cursor: none; opacity: .5; transition: opacity .2s; }
  .top-nav .nav-item:hover, .top-nav .nav-item.active { opacity: 1; }
  .top-nav .nav-brand { font-weight: 700; letter-spacing: .08em; font-size: 14px; }
  .top-nav .nav-admin { cursor: none; opacity: .4; font-size: 18px; transition: opacity .2s; }
  .top-nav .nav-admin:hover { opacity: 1; }
  .top-nav .nav-admin.active { opacity: 1; color: var(--red); }

  .canvas {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 80px 28px 100px;
  }

  .hero-block {
    margin-bottom: 48px;
    display: grid; grid-template-columns: 1fr auto;
    gap: 20px; align-items: end;
  }
  .hero-block h1 {
    font-size: clamp(42px, 8vw, 80px); font-weight: 900;
    letter-spacing: -0.03em; line-height: .92;
  }
  .hero-block .hero-meta {
    text-align: right; font-size: 13px; color: var(--gray);
    letter-spacing: .04em; line-height: 1.8;
  }

  .stats-row {
    display: flex; gap: 32px; margin-bottom: 40px;
    padding: 20px 0; border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    flex-wrap: wrap;
  }
  .stats-row .stat-num { font-size: 48px; font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
  .stats-row .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--gray); margin-top: 4px; }

  .filter-row {
    display: flex; gap: 20px; flex-wrap: wrap;
    margin-bottom: 32px; padding-bottom: 16px;
    border-bottom: 1px solid var(--light-gray);
  }
  .filter-tab {
    font-size: 12px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; cursor: none;
    color: var(--gray); padding-bottom: 4px;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .filter-tab:hover, .filter-tab.active { color: var(--ink); border-color: var(--ink); }
  .filter-tab .count { font-weight: 400; color: var(--gray); margin-left: 3px; font-size: 10px; }

  .search-row { display: flex; gap: 12px; margin-bottom: 32px; }
  .search-row input {
    flex: 1; padding: 12px 0; border: none; border-bottom: 2px solid var(--light-gray);
    background: transparent; font-size: 16px; font-family: var(--sans);
    outline: none; cursor: none; transition: border-color .2s;
  }
  .search-row input:focus { border-color: var(--ink); }
  .search-row button {
    padding: 12px 24px; background: var(--ink); color: var(--white);
    border: none; font-size: 13px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    font-family: var(--sans); cursor: none;
    transition: background .15s;
  }
  .search-row button:hover { background: var(--blue); }

  .section-title {
    font-size: 14px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; margin: 48px 0 20px;
    padding-bottom: 8px; border-bottom: 2px solid var(--ink);
    display: inline-block;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-bottom: 24px;
  }
  @media (max-width: 768px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .card-grid { grid-template-columns: 1fr; } }

  .card {
    position: relative;
    background: var(--white);
    padding: 18px;
    border: 1px solid var(--light-gray);
    transition: background .3s, border-color .3s;
    cursor: none;
    min-height: 120px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .card:hover { border-color: var(--ink); z-index: 2; }

  .card .quote-text {
    font-size: 12px; color: var(--gray); line-height: 1.6;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--light-gray);
  }

  .card.span-2 { grid-column: span 2; }
  @media (max-width: 480px) { .card.span-2 { grid-column: span 1; } }

  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--light-gray);
    transition: background .2s;
  }
  .card.card-yellow::before { background: var(--yellow); }
  .card.card-green::before { background: var(--green); }
  .card.card-blue::before { background: var(--blue); }
  .card.card-black::before { background: var(--ink); }

  .card .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .card .badge {
    font-size: 9px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; padding: 2px 8px; border: 1.5px solid var(--ink);
  }
  .badge.counseling { background: var(--ink); color: var(--white); }

  /* ══ Tag Manager (admin) ══ */
  .tag-manager { display: none; margin-bottom: 16px; padding: 12px 0; border-bottom: 1px solid var(--light-gray); }
  .admin-show .tag-manager { display: block; }
  .tag-manager .tag-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag-manager .tag-row input[type="text"] { padding: 4px 8px; border: 1px solid var(--light-gray); font-size: 11px; font-family: var(--sans); background: transparent; outline: none; min-width: 80px; }
  .tag-manager .tag-row input[type="color"] { width: 28px; height: 24px; border: none; cursor: none; padding: 0; }
  .tag-manager .tag-row button { font-size: 10px; padding: 3px 8px; cursor: none; }
  .tag-manager .add-tag-btn { font-size: 11px; margin-top: 6px; cursor: none; border: 1px dashed var(--gray); padding: 4px 12px; background: none; }

  .card .content { font-size: 15px; font-weight: 500; flex: 1; }

  .card .admin-actions {
    display: none; gap: 4px; position: absolute;
    top: 6px; right: 6px; z-index: 3;
  }
  .admin-show .admin-actions { display: flex; }
  .admin-actions button {
    font-size: 10px; padding: 2px 6px; border: 1px solid var(--ink);
    background: var(--white); cursor: none; font-family: var(--mono);
    letter-spacing: .04em;
  }
  .admin-actions button:hover { background: var(--ink); color: var(--white); }
  .admin-actions button.danger:hover { background: var(--red); border-color: var(--red); color: var(--white); }

  .card.editing { border-color: var(--blue); }
  .card.editing input, .card.editing textarea {
    width: 100%; padding: 6px 8px; margin: 3px 0;
    border: 1px solid var(--light-gray); font-size: 14px;
    font-family: var(--sans); outline: none;
  }
  .card.editing input:focus, .card.editing textarea:focus { border-color: var(--blue); }
  .card.editing textarea { min-height: 60px; resize: vertical; }
  .edit-btns { display: flex; gap: 6px; margin-top: 8px; }
  .edit-btns button {
    padding: 5px 14px; border: 1.5px solid var(--ink);
    font-size: 12px; font-weight: 600; letter-spacing: .04em;
    font-family: var(--sans); cursor: none; background: transparent;
  }
  .edit-btns .btn-save { background: var(--ink); color: var(--white); }
  .edit-btns .btn-save:hover { background: var(--blue); border-color: var(--blue); }
  .edit-btns .btn-cancel:hover { border-color: var(--gray); color: var(--gray); }

  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin: 32px 0 12px; font-size: 12px;
  }
  .pagination button {
    padding: 8px 20px; border: 2px solid var(--ink);
    background: transparent; font-size: 12px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    font-family: var(--sans); cursor: none;
    transition: all .15s;
  }
  .pagination button:hover:not(:disabled) { background: var(--ink); color: var(--white); }
  .pagination button:disabled { border-color: var(--light-gray); color: var(--gray); }
  .pagination .page-info { color: var(--gray); letter-spacing: .04em; }
  .pagination .page-num { color: var(--ink); font-weight: 700; }

  .add-btn { text-align: center; margin: 12px 0; }
  .add-btn button {
    padding: 8px 20px; border: 2px dashed var(--gray);
    background: transparent; font-size: 12px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    font-family: var(--sans); cursor: none; color: var(--gray);
    transition: all .15s;
  }
  .add-btn button:hover { border-color: var(--ink); color: var(--ink); border-style: solid; }

  .export-bar { text-align: center; margin: 40px 0; }
  .export-bar button {
    padding: 6px 16px; border: 1px solid var(--light-gray);
    background: transparent; font-size: 11px; font-family: var(--mono);
    color: var(--gray); cursor: none;
  }
  .export-bar button:hover { border-color: var(--ink); color: var(--ink); }

  .status-bar { text-align: center; font-size: 11px; font-family: var(--mono); color: var(--gray); margin-top: 20px; }
  .loading-text { text-align: center; font-family: var(--mono); font-size: 12px; color: var(--gray); padding: 40px; letter-spacing: .06em; }
  .empty-text { text-align: center; font-family: var(--mono); font-size: 12px; color: var(--gray); padding: 40px; letter-spacing: .06em; text-transform: uppercase; }

  /* ══ Splash ══ */
  .splash-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: var(--ink); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity .6s ease, visibility .6s ease;
  }
  .splash-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-overlay .splash-img-wrap {
    position: relative; margin-bottom: 24px;
    transition: transform .3s cubic-bezier(.16,1,.3,1);
    will-change: transform;
  }
  .splash-overlay .splash-img {
    width: min(80vw, 500px); display: block;
    border: 2px solid rgba(255,255,255,.15);
    transition: border-color .3s;
  }
  .splash-overlay:hover .splash-img { border-color: rgba(255,255,255,.4); }
  .splash-overlay .splash-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--gray);
    margin-bottom: 12px; transition: color .3s;
  }
  .splash-overlay:hover .splash-label { color: var(--white); }
  .splash-overlay .splash-title {
    font-size: clamp(32px, 6vw, 56px); font-weight: 900;
    letter-spacing: -0.02em; color: var(--white);
    font-family: var(--sans); margin-bottom: 4px;
    transition: transform .3s;
  }
  .splash-overlay:hover .splash-title { transform: scale(1.03); }
  .splash-overlay .splash-sub {
    font-size: 13px; color: var(--gray); letter-spacing: .06em;
    margin-bottom: 0;
  }
  .splash-overlay .splash-hint {
    position: absolute; bottom: 40px;
    font-family: var(--mono); font-size: 11px;
    color: var(--gray); letter-spacing: .1em;
    text-transform: uppercase;
    animation: hintPulse 2.4s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: .3; }
    50% { opacity: .9; }
  }

</style>
</head>

// ── Helpers ──
function escHtml(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function escAttr(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tagColor(name){var t=TAGS.find(function(x){return x.name===name;});return t?t.color:'#888';}
function genId(){return'new_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);}
function getCategories(tmi){if(tmi.categories){try{var a=JSON.parse(tmi.categories);if(a.length)return a;}catch(e){}}if(tmi.category)return[tmi.category];return[];}
function scrollToSection(id){var m={tmi:'tmiList',counseling:'counselingSection'};var el=document.getElementById(m[id]);if(el)el.scrollIntoView({behavior:'smooth'});document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});var t=document.querySelector('.nav-item[onclick*="'+id+'"]');if(t)t.classList.add('active');}

function getFilteredTmis(){var a=ALL_TMIS;if(tmiFilter)a=a.filter(function(t){return getCategories(t).indexOf(tmiFilter)>-1;});if(tmiSearch){var kw=tmiSearch.toLowerCase();a=a.filter(function(t){return(t.content||'').toLowerCase().indexOf(kw)>-1||(t.quote||'').toLowerCase().indexOf(kw)>-1;});}return a;}
function getFilteredCounselings(){var a=ALL_COUNSELINGS;if(counselingSearch){var kw=counselingSearch.toLowerCase();a=a.filter(function(c){return(c.content||'').toLowerCase().indexOf(kw)>-1||(c.quote||'').toLowerCase().indexOf(kw)>-1;});}return a;}

function renderCategories(){var tabs=document.getElementById('tabs');var counts={};for(var i=0;i<TAGS.length;i++)counts[TAGS[i].name]=0;for(var i=0;i<ALL_TMIS.length;i++){var cats=getCategories(ALL_TMIS[i]);for(var j=0;j<cats.length;j++){if(counts[cats[j]]!==undefined)counts[cats[j]]++;}}var h='<span class="filter-tab active" onclick="filterTMI(null,event)">全部</span>';for(var i=0;i<TAGS.length;i++){var c=TAGS[i].name;if(counts[c]>0)h+='<span class="filter-tab" onclick="filterTMI(\''+escAttr(c)+'\',event)">'+escHtml(c)+'<span class="count">'+counts[c]+'</span></span>';}tabs.innerHTML=h;}

function renderBadges(t){var cats=getCategories(t);if(!cats.length)return'';var h='<div class="badges">';for(var i=0;i<cats.length;i++){var c=tagColor(cats[i]);h+='<span class="badge" style="border-color:'+c+';color:'+c+'">'+escHtml(cats[i])+'</span>';}return h+'</div>';}

var cardColors=['card-yellow','card-green','card-blue','card-black'];
function cardColor(i){return cardColors[i%cardColors.length];}
function spanClass(i,total){if(total<=3)return'';if(i===0||i===Math.floor(total/2))return' span-2';return'';}

// ── TMI Card ──
function renderTmiCard(t,editing,idx,total){
  if(editing){var curCats=getCategories(t),checks='';for(var i=0;i<TAGS.length;i++){var c=TAGS[i].name,ch=curCats.indexOf(c)>-1?' checked':'',tc=tagColor(c);checks+='<label style="display:inline-flex;align-items:center;gap:3px;margin:2px 8px 2px 0;font-size:11px;cursor:none"><input type="checkbox" id="ecat_'+t.id+'_'+i+'" value="'+escAttr(c)+'"'+ch+'><span class="badge" style="border-color:'+tc+';color:'+tc+'">'+escHtml(c)+'</span></label>';}return'<div class="card editing" data-tmi-id="'+t.id+'"><div style="margin-bottom:6px">'+checks+'</div><textarea id="ect_'+t.id+'">'+escHtml(t.content)+'</textarea><input id="eqt_'+t.id+'" value="'+escAttr(t.quote||'')+'" placeholder="引用原句（可选）"/><div class="edit-btns"><button class="btn-save" onclick="saveTmi(\''+t.id+'\')">保存</button><button class="btn-cancel" onclick="cancelEditTmi(\''+t.id+'\')">取消</button></div></div>';}
  var adm=isAdmin?'<div class="admin-actions"><button onclick="editTmi(\''+t.id+'\')">E</button><button class="danger" onclick="deleteTmi(\''+t.id+'\')">D</button></div>':'';
  return'<div class="card '+cardColor(idx)+spanClass(idx,total)+'" data-tmi-id="'+t.id+'">'+renderBadges(t)+'<div class="content">'+escHtml(t.content)+'</div>'+(t.quote?'<div class="quote-text">'+escHtml(t.quote)+'</div>':'')+(t.post_url?'<a href="'+escAttr(t.post_url)+'" target="_blank" style="font-size:10px;font-family:var(--mono);color:var(--gray);text-decoration:none;display:block;margin-top:8px">查看原帖 &rarr;</a>':'')+adm+'</div>';
}

function renderTmiList(){var list=document.getElementById('tmiList');var tmis=getFilteredTmis();if(!tmis.length){list.innerHTML='<span class="empty-text">暂无 TMI 数据</span>';return;}var tp=Math.ceil(tmis.length/PAGE_SIZE);if(tmiPage>tp)tmiPage=tp;var items=tmis.slice((tmiPage-1)*PAGE_SIZE,tmiPage*PAGE_SIZE);var h='';for(var i=0;i<items.length;i++)h+=renderTmiCard(items[i],false,i,items.length);list.innerHTML=h;var pagEl=document.getElementById('tmiPagination');if(tp>1){pagEl.innerHTML='<div class="pagination"><button'+(tmiPage<=1?' disabled':'')+' onclick="changeTmiPage('+(tmiPage-1)+')">&larr; PREV</button><span class="page-info">PAGE <span class="page-num">'+tmiPage+'</span> / '+tp+' &nbsp;('+tmis.length+' items)</span><button'+(tmiPage>=tp?' disabled':'')+' onclick="changeTmiPage('+(tmiPage+1)+')">NEXT &rarr;</button></div>';pagEl.style.display='';}else pagEl.style.display='none';document.getElementById('addTmiBtn').style.display=isAdmin?'block':'none';}
function changeTmiPage(n){tmiPage=n;renderTmiList();window.scrollTo({top:0,behavior:'smooth'});}

function editTmi(id){var t=ALL_TMIS.find(function(x){return x.id==id;});if(!t)return;document.querySelector('.card[data-tmi-id="'+id+'"]').outerHTML=renderTmiCard(t,true,0,1);}
function cancelEditTmi(id){var t=ALL_TMIS.find(function(x){return x.id==id;});if(!t)return;var el=document.querySelector('.card.editing[data-tmi-id="'+id+'"]');if(!el)return;var idx=Array.from(el.parentNode.children).indexOf(el);el.outerHTML=renderTmiCard(t,false,idx,el.parentNode.children.length);}
function saveTmi(id){var t=ALL_TMIS.find(function(x){return x.id==id;});if(!t)return;var cats=[];for(var i=0;i<TAGS.length;i++){var cb=document.getElementById('ecat_'+id+'_'+i);if(cb&&cb.checked)cats.push(cb.value);}t.categories=cats;t.category=cats.length>0?cats[0]:'';t.content=document.getElementById('ect_'+id).value;t.quote=document.getElementById('eqt_'+id).value;persist();renderTmiList();renderCategories();}
function deleteTmi(id){if(!confirm('确定删除？'))return;ALL_TMIS.splice(ALL_TMIS.findIndex(function(x){return x.id==id;}),1);persist();renderTmiList();renderStats();renderCategories();}
function newTmi(){var dc=TAGS.length>0?TAGS[0].name:'未分类';var t={id:genId(),content:'',categories:[dc],quote:'',post_url:'',post_date:''};ALL_TMIS.unshift(t);persist();renderTmiList();renderStats();renderCategories();setTimeout(function(){editTmi(t.id);},50);}

// ── Counseling ──
function renderCounselingCard(c,editing,idx,total){
  if(editing)return'<div class="card editing" data-counseling-id="'+c.id+'"><textarea id="cect_'+c.id+'">'+escHtml(c.content)+'</textarea><input id="ceqt_'+c.id+'" value="'+escAttr(c.quote||'')+'" placeholder="引用原句（可选）"/><div class="edit-btns"><button class="btn-save" onclick="saveCounseling(\''+c.id+'\')">保存</button><button class="btn-cancel" onclick="cancelEditCounseling(\''+c.id+'\')">取消</button></div></div>';
  var adm=isAdmin?'<div class="admin-actions"><button onclick="editCounseling(\''+c.id+'\')">E</button><button class="danger" onclick="deleteCounseling(\''+c.id+'\')">D</button></div>':'';
  return'<div class="card card-green'+spanClass(idx,total)+'" data-counseling-id="'+c.id+'"><span class="badge counseling">商谈</span><div class="content" style="margin-top:6px">'+escHtml(c.content)+'</div>'+(c.quote?'<div class="quote-text">'+escHtml(c.quote)+'</div>':'')+(c.post_url?'<a href="'+escAttr(c.post_url)+'" target="_blank" style="font-size:10px;font-family:var(--mono);color:var(--gray);text-decoration:none;display:block;margin-top:8px">查看原帖 &rarr;</a>':'')+adm+'</div>';
}
function renderCounselingList(){var list=document.getElementById('counselingList');var items=getFilteredCounselings();if(!items.length){list.innerHTML='<span class="empty-text">暂无烦恼商谈</span>';return;}var tp=Math.ceil(items.length/PAGE_SIZE);if(counselingPage>tp)counselingPage=tp;var pi=items.slice((counselingPage-1)*PAGE_SIZE,counselingPage*PAGE_SIZE);var h='';for(var i=0;i<pi.length;i++)h+=renderCounselingCard(pi[i],false,i,pi.length);list.innerHTML=h;var pagEl=document.getElementById('counselingPagination');if(tp>1){pagEl.innerHTML='<div class="pagination"><button'+(counselingPage<=1?' disabled':'')+' onclick="changeCounselingPage('+(counselingPage-1)+')">&larr; PREV</button><span class="page-info">PAGE <span class="page-num">'+counselingPage+'</span> / '+tp+' &nbsp;('+items.length+' items)</span><button'+(counselingPage>=tp?' disabled':'')+' onclick="changeCounselingPage('+(counselingPage+1)+')">NEXT &rarr;</button></div>';pagEl.style.display='';}else pagEl.style.display='none';document.getElementById('addCounselingBtn').style.display=isAdmin?'block':'none';}
function changeCounselingPage(n){counselingPage=n;renderCounselingList();window.scrollTo({top:0,behavior:'smooth'});}
function editCounseling(id){var c=ALL_COUNSELINGS.find(function(x){return x.id==id;});if(!c)return;document.querySelector('.card[data-counseling-id="'+id+'"]').outerHTML=renderCounselingCard(c,true,0,1);}
function cancelEditCounseling(id){var c=ALL_COUNSELINGS.find(function(x){return x.id==id;});if(!c)return;var el=document.querySelector('.card.editing[data-counseling-id="'+id+'"]');if(!el)return;var idx=Array.from(el.parentNode.children).indexOf(el);el.outerHTML=renderCounselingCard(c,false,idx,el.parentNode.children.length);}
function saveCounseling(id){var c=ALL_COUNSELINGS.find(function(x){return x.id==id;});if(!c)return;c.content=document.getElementById('cect_'+id).value;c.quote=document.getElementById('ceqt_'+id).value;persist();renderCounselingList();}
function deleteCounseling(id){if(!confirm('确定删除？'))return;ALL_COUNSELINGS.splice(ALL_COUNSELINGS.findIndex(function(x){return x.id==id;}),1);persist();renderCounselingList();renderStats();}
function newCounseling(){var c={id:genId(),content:'',quote:'',post_url:'',post_date:''};ALL_COUNSELINGS.unshift(c);persist();renderCounselingList();renderStats();setTimeout(function(){editCounseling(c.id);},50);}

// ── Search ──
function doSearch(){var q=document.getElementById('searchInput').value.trim();if(!q){tmiSearch=null;counselingSearch=null;tmiFilter=null;}else{tmiSearch=q;counselingSearch=q;tmiFilter=null;}document.querySelectorAll('.filter-tab').forEach(function(t){t.classList.remove('active');});if(!q){var f=document.querySelector('.filter-tab');if(f)f.classList.add('active');}tmiPage=1;counselingPage=1;renderTmiList();renderCounselingList();}
function filterTMI(cat,ev){tmiFilter=cat;tmiSearch=null;document.getElementById('searchInput').value='';var tabs=document.querySelectorAll('.filter-tab');for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');if(cat&&ev)ev.target.classList.add('active');else{var f=document.querySelector('.filter-tab');if(f)f.classList.add('active');}tmiPage=1;renderTmiList();}

// ── Tag Management ──
function renderTagManager(){
  if(!isAdmin){ document.getElementById('tagManager').style.display='none'; return; }
  document.getElementById('tagManager').style.display='block';
  var h='';
  for(var i=0;i<TAGS.length;i++){
    var t=TAGS[i];
    h+='<div class="tag-row"><input type="color" value="'+t.color+'" id="tagcolor_'+i+'" title="颜色"><input type="text" value="'+escAttr(t.name)+'" id="tagname_'+i+'" placeholder="标签名"><button onclick="deleteTag('+i+')" style="color:var(--red)">删除</button></div>';
  }
  document.getElementById('tagList').innerHTML=h;
}
function addTag(){
  var used=TAGS.map(function(t){return t.color;});
  var nc=PALETTE.find(function(c){return used.indexOf(c)===-1;})||PALETTE[TAGS.length%PALETTE.length];
  TAGS.push({name:'新标签',color:nc}); renderTagManager();
}
function deleteTag(i){ TAGS.splice(i,1); renderTagManager(); }
function saveTags(){
  var oldTags=TAGS.map(function(t){return {name:t.name,color:t.color};});
  for(var i=0;i<TAGS.length;i++){
    var ni=document.getElementById('tagname_'+i),ci=document.getElementById('tagcolor_'+i);
    if(ni)TAGS[i].name=ni.value.trim(); if(ci)TAGS[i].color=ci.value;
  }
  // Propagate renames to local TMI data
  for(var i=0;i<TAGS.length;i++){
    if(oldTags[i].name!==TAGS[i].name){
      var oldN=oldTags[i].name,newN=TAGS[i].name;
      for(var j=0;j<ALL_TMIS.length;j++){
        var cats=getCategories(ALL_TMIS[j]),idx=cats.indexOf(oldN);
        if(idx>-1){cats[idx]=newN;ALL_TMIS[j].categories=cats;ALL_TMIS[j].category=cats[0]||'';}
      }
    }
  }
  persist(); renderTagManager(); renderCategories(); renderTmiList();
}
function resetTags(){
  if(!confirm('恢复默认标签？'))return;
  TAGS=DEFAULT_TAGS.map(function(t){return {name:t.name,color:t.color};});
  renderTagManager(); renderCategories(); renderTmiList();
}

// ── Admin ──
function toggleAdminMode(){if(isAdmin){isAdmin=false;document.getElementById('navAdmin').classList.remove('active');document.body.classList.remove('admin-show');}else{var pw=prompt('请输入管理密码 / PASSWORD');if(pw!==ADMIN_PASSWORD){alert('密码错误');return;}isAdmin=true;document.getElementById('navAdmin').classList.add('active');document.body.classList.add('admin-show');}renderAll();}

// ── Export ──
function exportData(){var blob=new Blob([JSON.stringify({tmis:ALL_TMIS,counselings:ALL_COUNSELINGS},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jellyhooish_data.json';a.click();}

// ── Init ──
function renderAll(){renderStats();renderCategories();renderTmiList();renderCounselingList();renderTagManager();}
renderAll();
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
</script>
