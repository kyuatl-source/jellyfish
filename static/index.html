<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jellyhooish · 韩志薰</title>
<style>
  :root {
    --bg: #f2f6f5;
    --card: #ffffff;
    --text: #2c3a3a;
    --muted: #8a9e9a;
    --accent: #6baaa0;
    --accent-soft: #e5f2ef;
    --border: #dce8e5;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(100,140,135,.06);
    --shadow-lg: 0 4px 24px rgba(100,140,135,.10);
    --blue: #7eb8c8;
    --blue-soft: #e8f2f6;
    --green: #8cb88c;
    --green-soft: #edf5ed;
    --yellow: #e0cf8a;
    --yellow-soft: #faf6e8;
  }

  * { margin:0; padding:0; box-sizing:border-box }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: linear-gradient(180deg, #e8f0f5 0%, #f2f6f5 30%, #f5f7f2 100%);
    color: var(--text); line-height: 1.7;
    min-height: 100vh;
  }

  /* Splash */
  .splash-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(160deg, #dce8f0 0%, #e8f0e8 40%, #f5f0e0 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity .6s ease, visibility .6s ease;
  }
  .splash-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-img {
    width: min(92vw, 600px); border-radius: 20px;
    box-shadow: 0 8px 40px rgba(80,120,110,.18), 0 2px 8px rgba(0,0,0,.06);
    animation: splashFloat 3s ease-in-out infinite;
  }
  @keyframes splashFloat {
    0%,100% { transform: translateY(0) }
    50% { transform: translateY(-8px) }
  }
  .splash-title {
    font-size: 36px; font-weight: 700; color: #4a8a7e;
    margin-top: 22px; letter-spacing: 2px;
    font-family: "Georgia", "Noto Serif SC", serif;
  }
  .splash-sub {
    font-size: 14px; color: #8a9e9a; margin-top: 6px; letter-spacing: 1px;
  }
  .splash-enter {
    margin-top: 24px; padding: 10px 36px;
    border-radius: 24px; border: 1.5px solid #6baaa0;
    background: rgba(255,255,255,.6); color: #4a8a7e;
    font-size: 15px; cursor: pointer; letter-spacing: 1px;
    backdrop-filter: blur(6px); transition: all .25s;
  }
  .splash-enter:hover { background: #6baaa0; color: #fff; }

  .container { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

  /* Header */
  .header-area {
    text-align: center; margin-bottom: 28px; padding: 36px 20px 28px;
    background: linear-gradient(160deg, #5a9aa0 0%, #7eb8c8 40%, #8cb88c 100%);
    border-radius: 20px; color: #fff;
    box-shadow: 0 6px 30px rgba(80,140,140,.18);
    position: relative; overflow: hidden;
  }
  .header-area::before {
    content: ''; position: absolute; top: -50px; right: -30px;
    width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,.06);
  }
  .header-area::after {
    content: ''; position: absolute; bottom: -30px; left: -20px;
    width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,.04);
  }
  .header-area h1 {
    font-size: 30px; font-weight: 700; letter-spacing: 2px;
    position: relative; z-index: 1;
    font-family: "Georgia", "Noto Serif SC", serif;
  }
  .header-area .subtitle { font-size: 14px; opacity: .85; margin-top: 4px; position: relative; z-index: 1; }

  /* Stats */
  .stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 18px; text-align: center;
    min-width: 75px; box-shadow: var(--shadow);
  }
  .stat .num { font-size: 22px; font-weight: 700; color: var(--accent) }
  .stat .label { font-size: 11px; color: var(--muted) }

  /* Search */
  .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-box input {
    flex: 1; padding: 10px 16px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 15px; outline: none; background: var(--card);
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--accent) }
  .search-box button {
    padding: 10px 22px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); font-size: 15px; cursor: pointer;
    font-weight: 500; transition: background .2s;
  }
  .search-box button:hover { background: #5a9688 }

  /* Tabs */
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab {
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--card); font-size: 13px; cursor: pointer; transition: all .2s; color: var(--muted);
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent) }
  .tab .count { opacity: .6; font-size: 11px; margin-left: 2px }

  /* Section title */
  .section-title {
    font-size: 18px; font-weight: 600; margin: 28px 0 14px;
    padding-left: 12px; border-left: 3px solid var(--accent); color: var(--text);
  }

  /* TMI cards */
  .tmi-list { display: flex; flex-direction: column; gap: 10px }
  .tmi-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow);
    transition: box-shadow .2s;
  }
  .tmi-card:hover { box-shadow: var(--shadow-lg) }
  .tmi-card .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 6px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .tmi-card .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; white-space: nowrap;
  }
  .badge.counseling { background: var(--green-soft); color: #6a8a5a }
  .badge.cat-性格习惯 { background: #e8e0f5; color: #6a5a8a }
  .badge.cat-人际关系 { background: #f5e0e8; color: #a06078 }
  .badge.cat-价值观念 { background: #e0e0f5; color: #5a5a90 }
  .badge.cat-兴趣爱好 { background: #d8f0d8; color: #4a7a4a }
  .badge.cat-成长经历 { background: #d8e8f5; color: #4a6a8a }
  .badge.cat-日常碎片 { background: #d8f0e8; color: #4a7a6a }
  .badge.cat-身体小细节 { background: #f5f0d8; color: #8a7a40 }
  .badge.cat-语言能力 { background: #d0f0f0; color: #3a7a7a }
  .badge.cat-饮食偏好 { background: #f5e8d8; color: #8a6a4a }
  .badge.cat-恐惧与反应 { background: #f5e0d8; color: #a05040 }
  .tmi-card .content { font-size: 15px; margin-bottom: 2px }
  .tmi-card .quote {
    font-size: 13px; color: var(--muted); margin-top: 6px;
    padding-left: 8px; border-left: 2.5px solid var(--accent);
  }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 10px }
  .timeline-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow);
  }
  .timeline-item .date { font-size: 13px; color: var(--accent); font-weight: 500 }
  .timeline-item .title { font-size: 15px; font-weight: 500 }
  .timeline-item .detail { font-size: 13px; color: var(--muted); margin-top: 2px }

  .empty { text-align: center; color: var(--muted); padding: 40px }
  .loading { text-align: center; color: var(--muted); padding: 30px; font-size: 14px; }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 14px; font-size: 13px; color: var(--muted);
  }
  .pagination button {
    padding: 5px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer; font-size: 13px; color: var(--accent);
    font-family: inherit; transition: all .2s;
  }
  .pagination button:hover { background: var(--accent-soft); border-color: var(--accent); }
  .pagination button:disabled { color: var(--muted); cursor: default; opacity: .4; background: transparent; }
  .pagination .page-num { font-weight: 600; color: var(--accent); }

  /* Admin */
  .export-bar { text-align: center; margin-top: 24px; }
  .export-bar button {
    padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer; font-size: 12px; color: var(--muted);
    font-family: inherit; transition: all .2s;
  }
  .export-bar button:hover { border-color: var(--accent); color: var(--accent); }

  .admin-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font-size: 18px; cursor: pointer;
    box-shadow: 0 3px 14px rgba(100,160,150,.30);
    transition: all .25s;
  }
  .admin-toggle:hover { transform: scale(1.08); }
  .admin-toggle.active { background: #e07060; }

  .admin-actions { display: none; gap: 4px; flex-shrink: 0; }
  .admin-show .admin-actions { display: flex; }
  .admin-actions button {
    font-size: 11px; padding: 2px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; color: var(--muted);
    font-family: inherit; transition: all .15s;
  }
  .admin-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .admin-actions button.danger:hover { border-color: #e07060; color: #e07060; }

  .tmi-card.editing { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(107,170,160,.12); }
  .tmi-card.editing input,
  .tmi-card.editing textarea,
  .tmi-card.editing select {
    width: 100%; padding: 6px 10px; margin: 3px 0; border: 1.5px solid var(--border);
    border-radius: 6px; font-size: 14px; font-family: inherit; outline: none;
  }
  .tmi-card.editing input:focus,
  .tmi-card.editing textarea:focus,
  .tmi-card.editing select:focus { border-color: var(--accent); }
  .tmi-card.editing textarea { min-height: 60px; resize: vertical; }
  .edit-btns { display: flex; gap: 6px; margin-top: 8px; }
  .edit-btns button {
    padding: 5px 14px; border-radius: 8px; border: none; font-size: 13px;
    cursor: pointer; font-family: inherit; font-weight: 500;
  }
  .edit-btns .btn-save { background: var(--accent); color: #fff; }
  .edit-btns .btn-cancel { background: #e8e8e8; color: #666; }
  .refresh-hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 30px; }

  .status-bar { text-align: center; font-size: 11px; color: var(--muted); margin-top: 4px; }

  @media (max-width: 480px) {
    .container { padding: 16px 12px 40px; }
    .header-area { padding: 24px 14px 20px; border-radius: 16px; }
    .header-area h1 { font-size: 24px; }
    .stats { gap: 6px; }
    .stat { padding: 10px 12px; min-width: 60px; }
    .stat .num { font-size: 18px; }
    .splash-img { width: 90vw; }
    .splash-title { font-size: 28px; }
  }
</style>
</head>

<script>
const TMI_CATEGORIES = ['性格习惯','人际关系','价值观念','兴趣爱好','成长经历','日常碎片','身体小细节','语言能力','饮食偏好','恐惧与反应'];
const PAGE_SIZE = 15;
const ADMIN_PASSWORD = '03280522';

// ── State ──
var ALL_TMIS = [];
var ALL_COUNSELINGS = [];
var ALL_SCHEDULES = [];
var tmiFilter = null, tmiSearch = null, counselingSearch = null;
var tmiPage = 1, counselingPage = 1;
var isAdmin = false;
var loading = true;

// ── Splash ──
function enterSite() {
  document.getElementById('splashOverlay').classList.add('hide');
  document.getElementById('mainContent').style.display = 'block';
  sessionStorage.setItem('splash_shown', '1');
}
if (sessionStorage.getItem('splash_shown')) {
  document.getElementById('splashOverlay').classList.add('hide');
  document.getElementById('mainContent').style.display = 'block';
}

// ── Helpers ──
function escHtml(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escAttr(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function catClass(cat){ return 'cat-'+cat; }
function getCategories(tmi) {
  if (tmi.categories) {
    try { var arr = JSON.parse(tmi.categories); if (arr.length) return arr; } catch(e) {}
  }
  if (tmi.category) return [tmi.category];
  return [];
}
function status(msg){ var el=document.getElementById('statusBar'); if(el)el.textContent=msg; }

// ── API ──
async function apiGet(path) {
  var resp = await fetch(path);
  if (!resp.ok) throw new Error(resp.status+' '+resp.statusText);
  return resp.json();
}
async function apiPost(path, body) {
  var resp = await fetch(path, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!resp.ok) throw new Error(resp.status+' '+resp.statusText);
  return resp.json();
}
async function apiPut(path, body) {
  var resp = await fetch(path, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!resp.ok) throw new Error(resp.status+' '+resp.statusText);
  return resp.json();
}
async function apiDelete(path) {
  var resp = await fetch(path, {method:'DELETE'});
  if (!resp.ok) throw new Error(resp.status+' '+resp.statusText);
  return resp.json();
}

// ── Data Loading ──
async function loadAllData() {
  loading = true;
  renderAll();
  try {
    var _a = await Promise.all([
      apiGet('/api/tmis?idol_id=1'),
      apiGet('/api/counselings?idol_id=1'),
      apiGet('/api/schedules?idol_id=1')
    ]);
    ALL_TMIS = _a[0]; ALL_COUNSELINGS = _a[1]; ALL_SCHEDULES = _a[2];
    loading = false;
    status('数据已加载 — '+ALL_TMIS.length+' TMI, '+ALL_COUNSELINGS.length+' 烦恼商谈, '+ALL_SCHEDULES.length+' 行程');
  } catch(e) {
    loading = false;
    status('加载失败：'+e.message+' — 请确认服务器已启动');
    ALL_TMIS=[]; ALL_COUNSELINGS=[]; ALL_SCHEDULES=[];
  }
  renderAll();
}

// ── Filter ──
function getFilteredTmis(){
  var arr = ALL_TMIS;
  if (tmiFilter) arr = arr.filter(function(t){
    var cats = getCategories(t);
    return cats.indexOf(tmiFilter) > -1;
  });
  if (tmiSearch){ var kw=tmiSearch.toLowerCase(); arr=arr.filter(function(t){return (t.content||'').toLowerCase().indexOf(kw)>-1 || (t.quote||'').toLowerCase().indexOf(kw)>-1;}); }
  return arr;
}
function getFilteredCounselings(){
  var arr = ALL_COUNSELINGS;
  if (counselingSearch){ var kw=counselingSearch.toLowerCase(); arr=arr.filter(function(c){return (c.content||'').toLowerCase().indexOf(kw)>-1 || (c.quote||'').toLowerCase().indexOf(kw)>-1;}); }
  return arr;
}

// ── Stats ──
function renderStats(){
  if(loading){ document.getElementById('stats').innerHTML='<div class="loading">加载中...</div>'; return; }
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="num">'+ALL_TMIS.length+'</div><div class="label">TMI</div></div>'+
    '<div class="stat"><div class="num">'+ALL_COUNSELINGS.length+'</div><div class="label">烦恼商谈</div></div>'+
    '<div class="stat"><div class="num">'+ALL_SCHEDULES.length+'</div><div class="label">行程</div></div>';
}

// ── Categories ──
function renderCategories(){
  var tabs = document.getElementById('tabs');
  if(loading){ tabs.innerHTML=''; return; }
  var counts = {};
  for (var i=0; i<TMI_CATEGORIES.length; i++) counts[TMI_CATEGORIES[i]] = 0;
  for (var i=0; i<ALL_TMIS.length; i++) {
    var cats = getCategories(ALL_TMIS[i]);
    for (var j=0; j<cats.length; j++) { if (counts[cats[j]] !== undefined) counts[cats[j]]++; }
  }
  var h = '<span class="tab active" onclick="filterTMI(null)">全部</span>';
  for (var i=0; i<TMI_CATEGORIES.length; i++){
    var c = TMI_CATEGORIES[i];
    if (counts[c] > 0) h += '<span class="tab" onclick="filterTMI(\''+escAttr(c)+'\')">'+escHtml(c)+'<span class="count">'+counts[c]+'</span></span>';
  }
  tabs.innerHTML = h;
}

// ── Badges ──
function renderBadges(t) {
  var cats = getCategories(t);
  if (!cats.length) return '';
  var h = '<div class="badges">';
  for (var i=0; i<cats.length; i++) h += '<span class="badge '+catClass(cats[i])+'">'+escHtml(cats[i])+'</span>';
  h += '</div>';
  return h;
}

// ── TMI Card ──
function renderTmiCard(t, editing){
  if (editing){
    var curCats = getCategories(t);
    var checks = '';
    for (var i=0; i<TMI_CATEGORIES.length; i++){
      var c = TMI_CATEGORIES[i];
      var checked = curCats.indexOf(c) > -1 ? ' checked' : '';
      checks += '<label style="display:inline-flex;align-items:center;gap:3px;margin:2px 8px 2px 0;font-size:13px;cursor:pointer"><input type="checkbox" id="ecat_'+t.id+'_'+i+'" value="'+escAttr(c)+'"'+checked+'><span class="badge '+catClass(c)+'" style="font-size:11px">'+escHtml(c)+'</span></label>';
    }
    return '<div class="tmi-card editing" data-tmi-id="'+t.id+'">'+
      '<div style="margin-bottom:6px">'+checks+'</div>'+
      '<textarea id="ect_'+t.id+'">'+escHtml(t.content)+'</textarea>'+
      '<input id="eqt_'+t.id+'" value="'+escAttr(t.quote||'')+'" placeholder="引用原句（可选）" />'+
      '<div class="edit-btns"><button class="btn-save" onclick="saveTmi(\''+t.id+'\')">保存</button><button class="btn-cancel" onclick="cancelEditTmi(\''+t.id+'\')">取消</button></div></div>';
  }
  var adm = isAdmin ? '<div class="admin-actions"><button onclick="editTmi(\''+t.id+'\')">编辑</button><button class="danger" onclick="deleteTmi(\''+t.id+'\')">删除</button></div>' : '';
  return '<div class="tmi-card" data-tmi-id="'+t.id+'">'+
    '<div class="header">'+renderBadges(t)+adm+'</div>'+
    '<div class="content">'+escHtml(t.content)+'</div>'+
    (t.quote ? '<div class="quote">'+escHtml(t.quote)+'</div>' : '')+
    (t.post_url ? '<a href="'+escAttr(t.post_url)+'" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none">查看原帖 &rarr;</a>' : '')+
    '</div>';
}

function renderTmiList(){
  var list = document.getElementById('tmiList');
  if(loading){ list.innerHTML='<div class="loading">加载中...</div>'; return; }
  var tmis = getFilteredTmis();
  if (!tmis.length){ list.innerHTML = '<div class="empty">暂无 TMI 数据</div>'; return; }
  var tp = Math.ceil(tmis.length/PAGE_SIZE); if (tmiPage>tp) tmiPage=tp;
  var items = tmis.slice((tmiPage-1)*PAGE_SIZE, tmiPage*PAGE_SIZE);
  var h = '';
  for (var i=0; i<items.length; i++) h += renderTmiCard(items[i], false);
  if (tp>1){
    h += '<div class="pagination"><button'+(tmiPage<=1?' disabled':'')+' onclick="changeTmiPage('+(tmiPage-1)+')">上一页</button>'+
      '<span>第 <span class="page-num">'+tmiPage+'</span>/'+tp+' 页，共 '+tmis.length+' 条</span>'+
      '<button'+(tmiPage>=tp?' disabled':'')+' onclick="changeTmiPage('+(tmiPage+1)+')">下一页</button></div>';
  }
  if (isAdmin) h+= '<div style="text-align:center;margin-top:8px"><button onclick="newTmi()" style="padding:6px 16px;border:1.5px dashed var(--border);border-radius:10px;background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit">+ 新增 TMI</button></div>';
  list.innerHTML = h;
}

function changeTmiPage(n){ tmiPage=n; renderTmiList(); window.scrollTo({top:0,behavior:'smooth'}); }

// ── TMI CRUD (API) ──
function editTmi(id){ var t=ALL_TMIS.find(function(x){return x.id==id;}); if(!t)return; document.querySelector('.tmi-card[data-tmi-id="'+id+'"]').outerHTML = renderTmiCard(t, true); }
function cancelEditTmi(id){ var t=ALL_TMIS.find(function(x){return x.id==id;}); if(!t)return; document.querySelector('.tmi-card.editing[data-tmi-id="'+id+'"]').outerHTML = renderTmiCard(t, false); }

async function saveTmi(id){
  var cats = [];
  for (var i=0; i<TMI_CATEGORIES.length; i++){
    var cb = document.getElementById('ecat_'+id+'_'+i);
    if (cb && cb.checked) cats.push(cb.value);
  }
  var content = document.getElementById('ect_'+id).value;
  var quote = document.getElementById('eqt_'+id).value;
  var body = { content: content, quote: quote, categories: JSON.stringify(cats), category: cats.length>0?cats[0]:'' };
  try {
    await apiPut('/api/tmis/'+id, body);
    var t = ALL_TMIS.find(function(x){return x.id==id;});
    if (t) { t.content=content; t.quote=quote; t.categories=JSON.stringify(cats); t.category=body.category; }
    status('TMI 已保存');
  } catch(e) { status('保存失败：'+e.message); }
  renderTmiList(); renderCategories();
}

async function deleteTmi(id){
  if (!confirm('确定删除这条 TMI？')) return;
  try {
    await apiDelete('/api/tmis/'+id);
    ALL_TMIS = ALL_TMIS.filter(function(x){return x.id!=id;});
    status('TMI 已删除');
  } catch(e) { status('删除失败：'+e.message); }
  renderTmiList(); renderStats(); renderCategories();
}

async function newTmi(){
  try {
    var cats = JSON.stringify(['性格习惯']);
    var resp = await apiPost('/api/tmis', {idol_id:1, content:'', category:'性格习惯', categories:cats, quote:''});
    var t = {id:resp.id, content:'', category:'性格习惯', categories:cats, quote:'', post_url:'', post_date:''};
    ALL_TMIS.unshift(t);
    status('新 TMI 已创建');
  } catch(e) { status('创建失败：'+e.message); return; }
  renderTmiList(); renderStats(); renderCategories();
  setTimeout(function(){ editTmi(ALL_TMIS[0].id); }, 50);
}

// ── Counseling Card ──
function renderCounselingCard(c, editing){
  if (editing){
    return '<div class="tmi-card editing" data-counseling-id="'+c.id+'">'+
      '<textarea id="cect_'+c.id+'">'+escHtml(c.content)+'</textarea>'+
      '<input id="ceqt_'+c.id+'" value="'+escAttr(c.quote||'')+'" placeholder="引用原句（可选）" />'+
      '<div class="edit-btns"><button class="btn-save" onclick="saveCounseling(\''+c.id+'\')">保存</button><button class="btn-cancel" onclick="cancelEditCounseling(\''+c.id+'\')">取消</button></div></div>';
  }
  var adm = isAdmin ? '<div class="admin-actions"><button onclick="editCounseling(\''+c.id+'\')">编辑</button><button class="danger" onclick="deleteCounseling(\''+c.id+'\')">删除</button></div>' : '';
  return '<div class="tmi-card" data-counseling-id="'+c.id+'">'+
    '<div class="header"><span class="badge counseling">烦恼商谈</span>'+adm+'</div>'+
    '<div class="content">'+escHtml(c.content)+'</div>'+
    (c.quote ? '<div class="quote">'+escHtml(c.quote)+'</div>' : '')+
    (c.post_url ? '<a href="'+escAttr(c.post_url)+'" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none">查看原帖 &rarr;</a>' : '')+
    '</div>';
}

function renderCounselingList(){
  var list = document.getElementById('counselingList');
  if(loading){ list.innerHTML='<div class="loading">加载中...</div>'; return; }
  var items = getFilteredCounselings();
  if (!items.length){ list.innerHTML = '<div class="empty">暂无烦恼商谈数据</div>'; return; }
  var tp=Math.ceil(items.length/PAGE_SIZE); if(counselingPage>tp) counselingPage=tp;

      '<span>第 <span class="page-num">'+counselingPage+'</span>/'+tp+' 页，共 '+items.length+' 条</span>'+
      '<button'+(counselingPage>=tp?' disabled':'')+' onclick="changeCounselingPage('+(counselingPage+1)+')">下一页</button></div>';
  }
  if (isAdmin) h+= '<div style="text-align:center;margin-top:8px"><button onclick="newCounseling()" style="padding:6px 16px;border:1.5px dashed var(--border);border-radius:10px;background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit">+ 新增烦恼商谈</button></div>';
  list.innerHTML = h;

function changeCounselingPage(n){counselingPage=n;renderCounselingList();window.scrollTo({top:0,behavior:'smooth'});}

function editCounseling(id){var c=ALL_COUNSELINGS.find(function(x){return x.id==id;});if(!c)return;document.querySelector('.tmi-card[data-counseling-id="'+id+'"]').outerHTML=renderCounselingCard(c,true);}
function cancelEditCounseling(id){var c=ALL_COUNSELINGS.find(function(x){return x.id==id;});if(!c)return;document.querySelector('.tmi-card.editing[data-counseling-id="'+id+'"]').outerHTML=renderCounselingCard(c,false);}

async function saveCounseling(id){
  var content = document.getElementById('cect_'+id).value;
  var quote = document.getElementById('ceqt_'+id).value;
  try {
    await apiPut('/api/counselings/'+id, {content: content, quote: quote});

async function deleteCounseling(id){
  if(!confirm('确定删除？'))return;

// ── Search ──
function doSearch(){
  var q=document.getElementById('searchInput').value.trim();
  if(!q){tmiSearch=null;counselingSearch=null;tmiFilter=null;}
  else{tmiSearch=q;counselingSearch=q;tmiFilter=null;}
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(!q){var f=document.querySelector('.tab');if(f)f.classList.add('active');}
  tmiPage=1;counselingPage=1;renderTmiList();renderCounselingList();
}

function filterTMI(cat){tmiFilter=cat;tmiSearch=null;document.getElementById('searchInput').value='';var tabs=document.querySelectorAll('.tab');for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');if(cat)event.target.classList.add('active');else{var f=document.querySelector('.tab');if(f)f.classList.add('active');}tmiPage=1;renderTmiList();}

// ── Schedules ──
function renderTimeline(){
  var tl=document.getElementById('timeline');
  if(loading){ tl.innerHTML='<div class="loading">加载中...</div>'; return; }
  if(!ALL_SCHEDULES.length){tl.innerHTML='<div class="empty">暂无行程</div>';return;}
  tl.innerHTML=ALL_SCHEDULES.map(function(s){
    return '<div class="timeline-item"><div class="date">'+escHtml(s.start_date||'')+(s.end_date?' ~ '+escHtml(s.end_date):'')+'</div><div class="title">['+escHtml(s.event_type||'')+'] '+escHtml(s.title||'')+'</div>'+(s.location?'<div class="detail">'+escHtml(s.location)+'</div>':'')+(s.description?'<div class="detail">'+escHtml(s.description)+'</div>':'')+'</div>';
  }).join('');
}

// ── Admin ──
function toggleAdminMode(){
  if (isAdmin){isAdmin=false;document.getElementById('adminToggle').classList.remove('active');document.body.classList.remove('admin-show');}
  else{
    var pw=prompt('请输入管理密码');
    if(pw!==ADMIN_PASSWORD){alert('密码错误');return;}
    isAdmin=true;document.getElementById('adminToggle').classList.add('active');document.body.classList.add('admin-show');
  }
  renderAll();
}

// ── Export ──
function exportData(){
  var blob=new Blob([JSON.stringify({tmis:ALL_TMIS,counselings:ALL_COUNSELINGS,schedules:ALL_SCHEDULES},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jellyhooish_data.json';a.click();
}

// ── Init ──
function renderAll(){renderStats();renderCategories();renderTmiList();renderCounselingList();renderTimeline();}

document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});

loadAllData();
</script>
