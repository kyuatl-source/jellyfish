<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jellyhooish</title>
<style>
  :root {
    --paper: #f4f2ed;
    --ink: #141413;
    --white: #fff;
    --yellow: #f4e000;
    --green: #00e65c;
    --blue: #0037ff;
    --red: #ff3b30;
    --gray: #999;
    --light-gray: #e0ded8;
    --dark-overlay: rgba(10,10,8,.94);
    --sans: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Menlo", monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    cursor: none;
    overflow-x: hidden;
  }

  /* ══ Cursor Dot ══ */
  .cursor-dot {
    position: fixed; z-index: 9999;
    width: 10px; height: 10px;
    background: var(--ink);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width .15s, height .15s, background .15s;
    mix-blend-mode: difference;
  }
  .cursor-dot.hover-card { width: 28px; height: 28px; background: var(--yellow); mix-blend-mode: normal; }
  .cursor-dot.hover-nav { width: 6px; height: 6px; background: var(--white); mix-blend-mode: normal; }

  /* ══ Watermark ══ */
  .watermark {
    position: fixed; bottom: -6vh; left: -2vw; z-index: 0;
    font-family: var(--sans); font-size: 18vw; font-weight: 900;
    color: #e8e5dd; letter-spacing: -0.04em; line-height: .85;
    pointer-events: none; user-select: none;
    white-space: nowrap;
    transition: transform .6s cubic-bezier(.16,1,.3,1);
  }

  /* ══ Top Nav ══ */
  .top-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px;
    background: var(--ink);
    color: var(--white);
    font-size: 13px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
  }
  .top-nav .nav-left { display: flex; gap: 24px; }
  .top-nav .nav-item {
    cursor: none; opacity: .5;
    transition: opacity .2s;
  }
  .top-nav .nav-item:hover,
  .top-nav .nav-item.active { opacity: 1; }
  .top-nav .nav-brand {
    font-weight: 700; letter-spacing: .08em; font-size: 14px;
  }
  .top-nav .nav-admin {
    cursor: none; opacity: .4; font-size: 18px;
    transition: opacity .2s;
  }
  .top-nav .nav-admin:hover { opacity: 1; }
  .top-nav .nav-admin.active { opacity: 1; color: var(--red); }

  /* ══ Main Canvas ══ */
  .canvas {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 80px 28px 100px;
  }

  /* ══ Hero ══ */
  .hero-block {
    margin-bottom: 48px;
    display: grid; grid-template-columns: 1fr auto;
    gap: 20px; align-items: end;
  }
  .hero-block h1 {
    font-size: clamp(42px, 8vw, 80px); font-weight: 900;
    letter-spacing: -0.03em; line-height: .92;
  }
  .hero-block .hero-meta {
    text-align: right; font-size: 13px; color: var(--gray);
    letter-spacing: .04em; line-height: 1.8;
  }

  /* ══ Stats ══ */
  .stats-row {
    display: flex; gap: 32px; margin-bottom: 40px;
    padding: 20px 0; border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    flex-wrap: wrap;
  }
  .stats-row .stat-num {
    font-size: 48px; font-weight: 900; letter-spacing: -0.02em; line-height: 1;
  }
  .stats-row .stat-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: .08em; color: var(--gray); margin-top: 4px;
  }

  /* ══ Filter Tabs ══ */
  .filter-row {
    display: flex; gap: 20px; flex-wrap: wrap;
    margin-bottom: 32px; padding-bottom: 16px;
    border-bottom: 1px solid var(--light-gray);
  }
  .filter-tab {
    font-size: 12px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; cursor: none;
    color: var(--gray); padding-bottom: 4px;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .filter-tab:hover,
  .filter-tab.active { color: var(--ink); border-color: var(--ink); }
  .filter-tab .count { font-weight: 400; color: var(--gray); margin-left: 3px; font-size: 10px; }

  /* ══ Search ══ */
  .search-row { display: flex; gap: 12px; margin-bottom: 32px; }
  .search-row input {
    flex: 1; padding: 12px 0; border: none; border-bottom: 2px solid var(--light-gray);
    background: transparent; font-size: 16px; font-family: var(--sans);
    outline: none; cursor: none; transition: border-color .2s;
  }
  .search-row input:focus { border-color: var(--ink); }
  .search-row button {
    padding: 12px 24px; background: var(--ink); color: var(--white);
    border: none; font-size: 13px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    font-family: var(--sans); cursor: none;
    transition: background .15s;
  }
  .search-row button:hover { background: var(--blue); }

  /* ══ Section Title ══ */
  .section-title {
    font-size: 14px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; margin: 48px 0 20px;
    padding-bottom: 8px; border-bottom: 2px solid var(--ink);
    display: inline-block;
  }

  /* ══ Card Grid ══ */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-bottom: 24px;
  }
  @media (max-width: 768px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .card-grid { grid-template-columns: 1fr; } }

  /* ══ Card ══ */
  .card {
    position: relative;
    background: var(--white);
    padding: 18px;
    border: 1px solid var(--light-gray);
    transition: background .3s, border-color .3s;
    cursor: none;
    min-height: 120px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .card:hover { border-color: var(--ink); z-index: 2; }

  .card .card-overlay {
    position: absolute; inset: 0;
    background: var(--dark-overlay);
    color: var(--white);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; font-size: 14px; line-height: 1.7;
    opacity: 0; transition: opacity .25s;
    pointer-events: none; text-align: center;
  }
  .card:hover .card-overlay { opacity: 1; }

  .card.span-2 { grid-column: span 2; }
  @media (max-width: 480px) { .card.span-2 { grid-column: span 1; } }

  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--light-gray);
    transition: background .2s;
  }
  .card.card-yellow::before { background: var(--yellow); }
  .card.card-green::before { background: var(--green); }
  .card.card-blue::before { background: var(--blue); }
  .card.card-black::before { background: var(--ink); }

  /* Badges */
  .card .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .card .badge {
    font-size: 9px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; padding: 2px 8px; border: 1.5px solid var(--ink);
  }
  .badge.counseling { background: var(--ink); color: var(--white); }
  .badge.cat-性格习惯 { border-color: #5a4ac8; color: #5a4ac8; }
  .badge.cat-人际关系 { border-color: #c83a6a; color: #c83a6a; }
  .badge.cat-价值观念 { border-color: #3a3ac8; color: #3a3ac8; }
  .badge.cat-兴趣爱好 { border-color: #2a8a3a; color: #2a8a3a; }
  .badge.cat-成长经历 { border-color: #2a5ac8; color: #2a5ac8; }
  .badge.cat-日常碎片 { border-color: #2a7a5a; color: #2a7a5a; }
  .badge.cat-身体小细节 { border-color: #8a7a10; color: #8a7a10; }
  .badge.cat-语言能力 { border-color: #1a7a7a; color: #1a7a7a; }
  .badge.cat-饮食偏好 { border-color: #8a5a2a; color: #8a5a2a; }
  .badge.cat-恐惧与反应 { border-color: #c83020; color: #c83020; }

  .card .content { font-size: 15px; font-weight: 500; flex: 1; }

  /* Admin */
  .card .admin-actions {
    display: none; gap: 4px; position: absolute;
    top: 6px; right: 6px; z-index: 3;
  }
  .admin-show .admin-actions { display: flex; }
  .admin-actions button {
    font-size: 10px; padding: 2px 6px; border: 1px solid var(--ink);
    background: var(--white); cursor: none; font-family: var(--mono);
    letter-spacing: .04em;
  }
  .admin-actions button:hover { background: var(--ink); color: var(--white); }
  .admin-actions button.danger:hover { background: var(--red); border-color: var(--red); color: var(--white); }

  /* Editing */
  .card.editing { border-color: var(--blue); }
  .card.editing input, .card.editing textarea {
    width: 100%; padding: 6px 8px; margin: 3px 0;
    border: 1px solid var(--light-gray); font-size: 14px;
    font-family: var(--sans); outline: none;
  }
  .card.editing input:focus, .card.editing textarea:focus { border-color: var(--blue); }
  .card.editing textarea { min-height: 60px; resize: vertical; }
  .edit-btns { display: flex; gap: 6px; margin-top: 8px; }
  .edit-btns button {
    padding: 5px 14px; border: 1.5px solid var(--ink);
    font-size: 12px; font-weight: 600; letter-spacing: .04em;
    font-family: var(--sans); cursor: none; background: transparent;
  }
  .edit-btns .btn-save { background: var(--ink); color: var(--white); }
  .edit-btns .btn-save:hover { background: var(--blue); border-color: var(--blue); }
  .edit-btns .btn-cancel:hover { border-color: var(--gray); color: var(--gray); }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin: 32px 0 12px; font-size: 12px;
  }
  .pagination button {
    padding: 8px 20px; border: 2px solid var(--ink);
    background: transparent; font-size: 12px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    font-family: var(--sans); cursor: none;
    transition: all .15s;
  }
  .pagination button:hover:not(:disabled) { background: var(--ink); color: var(--white); }
  .pagination button:disabled { border-color: var(--light-gray); color: var(--gray); }
  .pagination .page-info { color: var(--gray); letter-spacing: .04em; }
  .pagination .page-num { color: var(--ink); font-weight: 700; }

  /* Add button */
  .add-btn { text-align: center; margin: 12px 0; }
  .add-btn button {
    padding: 8px 20px; border: 2px dashed var(--gray);
    background: transparent; font-size: 12px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    font-family: var(--sans); cursor: none; color: var(--gray);
    transition: all .15s;
  }
  .add-btn button:hover { border-color: var(--ink); color: var(--ink); border-style: solid; }

  /* Timeline */
  .timeline-card {
    background: var(--white); border: 1px solid var(--light-gray);
    padding: 18px; margin-bottom: 2px;
  }
  .timeline-card .tl-date {
    font-family: var(--mono); font-size: 11px; color: var(--gray);
    letter-spacing: .04em; margin-bottom: 4px;
  }
  .timeline-card .tl-title { font-size: 15px; font-weight: 600; }
  .timeline-card .tl-detail { font-size: 12px; color: var(--gray); margin-top: 2px; }

  /* Export */
  .export-bar { text-align: center; margin: 40px 0; }
  .export-bar button {
    padding: 6px 16px; border: 1px solid var(--light-gray);
    background: transparent; font-size: 11px; font-family: var(--mono);
    color: var(--gray); cursor: none;
  }
  .export-bar button:hover { border-color: var(--ink); color: var(--ink); }

  /* Status */
  .status-bar { text-align: center; font-size: 11px; font-family: var(--mono); color: var(--gray); margin-top: 20px; }
  .loading-text { text-align: center; font-family: var(--mono); font-size: 12px; color: var(--gray); padding: 40px; letter-spacing: .06em; }
  .empty-text { text-align: center; font-family: var(--mono); font-size: 12px; color: var(--gray); padding: 40px; letter-spacing: .06em; text-transform: uppercase; }
</style>
</head>
<body>

<!-- ══ Cursor ══ -->
<div class="cursor-dot" id="cursorDot"></div>

<!-- ══ Watermark ══ -->
<div class="watermark" id="watermark">JELLYHOOISH</div>

<!-- ══ Top Nav ══ -->
<nav class="top-nav">
  <div class="nav-left">
    <span class="nav-item active" onclick="scrollToSection('tmi')">TMI</span>
    <span class="nav-item" onclick="scrollToSection('counseling')">商谈</span>
    <span class="nav-item" onclick="scrollToSection('schedules')">行程</span>
  </div>
  <div class="nav-brand">jellyhooish</div>
  <span class="nav-admin" id="navAdmin" onclick="toggleAdminMode()" title="管理">&#9881;</span>
</nav>

<!-- ══ Main ══ -->
<div class="canvas" id="mainContent">

<div class="hero-block">
  <h1>jellyhooish</h1>
  <div class="hero-meta">
    韩志薰<br>Jihoon<br>TWS
  </div>
</div>

<div class="stats-row" id="stats"><span class="loading-text">LOADING...</span></div>

<div class="search-row">
  <input type="text" id="searchInput" placeholder="搜索关键词…" />
  <button onclick="doSearch()">搜索</button>
</div>

<div class="filter-row" id="tabs"><span class="loading-text">---</span></div>

<div class="card-grid" id="tmiList"><span class="loading-text">LOADING...</span></div>
<div id="tmiPagination"></div>
<div class="add-btn" id="addTmiBtn" style="display:none"><button onclick="newTmi()">+ 新增 TMI</button></div>

<div id="counselingSection">
  <span class="section-title">烦恼商谈</span>
  <div class="card-grid" id="counselingList"><span class="loading-text">LOADING...</span></div>
  <div id="counselingPagination"></div>
  <div class="add-btn" id="addCounselingBtn" style="display:none"><button onclick="newCounseling()">+ 新增烦恼商谈</button></div>
</div>

<div id="schedulesSection">
  <span class="section-title">行程</span>
  <div id="timeline"><span class="loading-text">LOADING...</span></div>
</div>

<div class="export-bar"><button onclick="exportData()">导出数据 / EXPORT JSON</button></div>
<div class="status-bar" id="statusBar">数据由服务器统一管理 · 所有修改实时共享</div>

</div>

<script>
const TMI_CATEGORIES = ['性格习惯','人际关系','价值观念','兴趣爱好','成长经历','日常碎片','身体小细节','语言能力','饮食偏好','恐惧与反应'];
const PAGE_SIZE = 15;
const ADMIN_PASSWORD = '03280522';

var ALL_TMIS = [], ALL_COUNSELINGS = [], ALL_SCHEDULES = [];
var tmiFilter = null, tmiSearch = null, counselingSearch = null;
var tmiPage = 1, counselingPage = 1;
var isAdmin = false, loading = true;

// ── Cursor Dot ──
var cx = -100, cy = -100, dx = -100, dy = -100;
document.addEventListener('mousemove', function(e){ cx=e.clientX; cy=e.clientY; });
document.addEventListener('mouseover', function(e){
  var dot=document.getElementById('cursorDot');
  if(e.target.closest('.card')) dot.classList.add('hover-card');
  else if(e.target.closest('.top-nav')) dot.classList.add('hover-nav');
  else dot.classList.remove('hover-card','hover-nav');
});
(function anim(){
  dx += (cx-dx)*.25; dy += (cy-dy)*.25;
  var d=document.getElementById('cursorDot');
  if(d){ d.style.left=dx+'px'; d.style.top=dy+'px'; }
  requestAnimationFrame(anim);
})();

// ── Watermark parallax ──
document.addEventListener('mousemove', function(e){
  var wm=document.getElementById('watermark');
  if(!wm) return;
  wm.style.transform='translate('+((e.clientX/window.innerWidth-.5)*12)+'px,'+((e.clientY/window.innerHeight-.5)*8)+'px)';
});

// ── Helpers ──
function escHtml(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escAttr(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function catClass(cat){ return 'cat-'+cat; }
function getCategories(tmi){
  if(tmi.categories){ try{var a=JSON.parse(tmi.categories); if(a.length)return a;}catch(e){} }
  if(tmi.category)return[tmi.category];
  return [];
}
function status(msg){ var el=document.getElementById('statusBar'); if(el)el.textContent=msg; }
function scrollToSection(id){
  var m={tmi:'tmiList',counseling:'counselingSection',schedules:'schedulesSection'};
  var el=document.getElementById(m[id]); if(el)el.scrollIntoView({behavior:'smooth'});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  var t=document.querySelector('.nav-item[onclick*="'+id+'"]'); if(t)t.classList.add('active');
}

// ── API ──
async function apiGet(p){var r=await fetch(p);if(!r.ok)throw new Error(r.status);return r.json();}
async function apiPost(p,b){var r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok)throw new Error(r.status);return r.json();}
async function apiPut(p,b){var r=await fetch(p,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});if(!r.ok)throw new Error(r.status);return r.json();}
async function apiDelete(p){var r=await fetch(p,{method:'DELETE'});if(!r.ok)throw new Error(r.status);return r.json();}

// ── Data ──
async function loadAllData(){
  loading=true; renderAll();
  try{
    var _a=await Promise.all([apiGet('/api/tmis?idol_id=1'),apiGet('/api/counselings?idol_id=1'),apiGet('/api/schedules?idol_id=1')]);
    ALL_TMIS=_a[0]; ALL_COUNSELINGS=_a[1]; ALL_SCHEDULES=_a[2]; loading=false;
    status(ALL_TMIS.length+' TMI  ·  '+ALL_COUNSELINGS.length+' 烦恼商谈  ·  '+ALL_SCHEDULES.length+' 行程');
  }catch(e){loading=false;status('加载失败：'+e.message);ALL_TMIS=[];ALL_COUNSELINGS=[];ALL_SCHEDULES=[];}
  renderAll();
}

// ── Filter ──
function getFilteredTmis(){var a=ALL_TMIS;if(tmiFilter)a=a.filter(function(t){return getCategories(t).indexOf(tmiFilter)>-1;});if(tmiSearch){var kw=tmiSearch.toLowerCase();a=a.filter(function(t){return(t.content||'').toLowerCase().indexOf(kw)>-1||(t.quote||'').toLowerCase().indexOf(kw)>-1;});}return a;}
function getFilteredCounselings(){var a=ALL_COUNSELINGS;if(counselingSearch){var kw=counselingSearch.toLowerCase();a=a.filter(function(c){return(c.content||'').toLowerCase().indexOf(kw)>-1||(c.quote||'').toLowerCase().indexOf(kw)>-1;});}return a;}

// ── Stats ──
function renderStats(){
  if(loading){document.getElementById('stats').innerHTML='<span class="loading-text">LOADING...</span>';return;}
  document.getElementById('stats').innerHTML=
    '<div><div class="stat-num">'+ALL_TMIS.length+'</div><div class="stat-label">TMI 条目</div></div>'+
    '<div><div class="stat-num">'+ALL_COUNSELINGS.length+'</div><div class="stat-label">烦恼商谈</div></div>'+
    '<div><div class="stat-num">'+ALL_SCHEDULES.length+'</div><div class="stat-label">行程事件</div></div>';
}

// ── Categories ──
function renderCategories(){
  var tabs=document.getElementById('tabs');if(loading){tabs.innerHTML='<span class="loading-text">---</span>';return;}
  var counts={};for(var i=0;i<TMI_CATEGORIES.length;i++)counts[TMI_CATEGORIES[i]]=0;
  for(var i=0;i<ALL_TMIS.length;i++){var cats=getCategories(ALL_TMIS[i]);for(var j=0;j<cats.length;j++){if(counts[cats[j]]!==undefined)counts[cats[j]]++;}}
  var h='<span class="filter-tab active" onclick="filterTMI(null)">全部</span>';
  for(var i=0;i<TMI_CATEGORIES.length;i++){var c=TMI_CATEGORIES[i];if(counts[c]>0)h+='<span class="filter-tab" onclick="filterTMI(\''+escAttr(c)+'\')">'+escHtml(c)+'<span class="count">'+counts[c]+'</span></span>';}
  tabs.innerHTML=h;
}

// ── Badges ──
function renderBadges(t){
  var cats=getCategories(t);if(!cats.length)return'';
  var h='<div class="badges">';
  for(var i=0;i<cats.length;i++)h+='<span class="badge '+catClass(cats[i])+'">'+escHtml(cats[i])+'</span>';
  return h+'</div>';
}

// ── Card accent color cycling ──
var cardColors=['card-yellow','card-green','card-blue','card-black'];
function cardColor(i){return cardColors[i%cardColors.length];}
function spanClass(i,total){
  if(total<=3)return'';
  if(i===0||i===Math.floor(total/2))return' span-2';
  return'';
}

// ── TMI Card ──
function renderTmiCard(t,editing,idx,total){
  if(editing){
    var curCats=getCategories(t),checks='';
    for(var i=0;i<TMI_CATEGORIES.length;i++){var c=TMI_CATEGORIES[i],ch=curCats.indexOf(c)>-1?' checked':'';checks+='<label style="display:inline-flex;align-items:center;gap:3px;margin:2px 8px 2px 0;font-size:11px;cursor:none"><input type="checkbox" id="ecat_'+t.id+'_'+i+'" value="'+escAttr(c)+'"'+ch+'><span class="badge '+catClass(c)+'">'+escHtml(c)+'</span></label>';}
    return'<div class="card editing" data-tmi-id="'+t.id+'"><div style="margin-bottom:6px">'+checks+'</div><textarea id="ect_'+t.id+'">'+escHtml(t.content)+'</textarea><input id="eqt_'+t.id+'" value="'+escAttr(t.quote||'')+'" placeholder="引用原句（可选）"/><div class="edit-btns"><button class="btn-save" onclick="saveTmi(\''+t.id+'\')">保存</button><button class="btn-cancel" onclick="cancelEditTmi(\''+t.id+'\')">取消</button></div></div>';
  }
  var adm=isAdmin?'<div class="admin-actions"><button onclick="editTmi(\''+t.id+'\')">E</button><button class="danger" onclick="deleteTmi(\''+t.id+'\')">D</button></div>':'';
  return'<div class="card '+cardColor(idx)+spanClass(idx,total)+'" data-tmi-id="'+t.id+'">'+
    renderBadges(t)+'<div class="content">'+escHtml(t.content)+'</div>'+
    (t.quote?'<div class="card-overlay"><div>'+escHtml(t.quote)+'</div></div>':'')+
    adm+'</div>';
}

function renderTmiList(){
  var list=document.getElementById('tmiList');if(loading){list.innerHTML='<span class="loading-text">LOADING...</span>';return;}
  var tmis=getFilteredTmis();if(!tmis.length){list.innerHTML='<span class="empty-text">暂无 TMI 数据</span>';return;}
  var tp=Math.ceil(tmis.length/PAGE_SIZE);if(tmiPage>tp)tmiPage=tp;
  var items=tmis.slice((tmiPage-1)*PAGE_SIZE,tmiPage*PAGE_SIZE);
  var h='';for(var i=0;i<items.length;i++)h+=renderTmiCard(items[i],false,i,items.length);
  list.innerHTML=h;
  var pagEl=document.getElementById('tmiPagination');
  if(tp>1){pagEl.innerHTML='<div class="pagination"><button'+(tmiPage<=1?' disabled':'')+' onclick="changeTmiPage('+(tmiPage-1)+')">&larr; PREV</button><span class="page-info">PAGE <span class="page-num">'+tmiPage+'</span> / '+tp+' &nbsp;('+tmis.length+' items)</span><button'+(tmiPage>=tp?' disabled':'')+' onclick="changeTmiPage('+(tmiPage+1)+')">NEXT &rarr;</button></div>';pagEl.style.display='';}
  else pagEl.style.display='none';
  document.getElementById('addTmiBtn').style.display=isAdmin?'block':'none';
}
function changeTmiPage(n){tmiPage=n;renderTmiList();window.scrollTo({top:0,behavior:'smooth'});}

// ── TMI CRUD ──
function editTmi(id){var t=ALL_TMIS.find(function(x){return x.id==id;});if(!t)return;document.querySelector('.card[data-tmi-id="'+id+'"]').outerHTML=renderTmiCard(t,true,0,1);}
function cancelEditTmi(id){var t=ALL_TMIS.find(function(x){return x.id==id;});if(!t)return;var el=document.querySelector('.card.editing[data-tmi-id="'+id+'"]');if(!el)return;var idx=Array.from(el.parentNode.children).indexOf(el);el.outerHTML=renderTmiCard(t,false,idx,el.parentNode.children.length);}
async function saveTmi(id){
  var cats=[];for(var i=0;i<TMI_CATEGORIES.length;i++){var cb=document.getElementById('ecat_'+id+'_'+i);if(cb&&cb.checked)cats.push(cb.value);}
  var content=document.getElementById('ect_'+id).value,quote=document.getElementById('eqt_'+id).value;
  var body={content:content,quote:quote,categories:JSON.stringify(cats),category:cats.length>0?cats[0]:''};
  try{await apiPut('/api/tmis/'+id,body);var t=ALL_TMIS.find(function(x){return x.id==id;});if(t){t.content=content;t.quote=quote;t.categories=JSON.stringify(cats);t.category=body.category;}status('TMI 已保存');}catch(e){status('保存失败：'+e.message);}
  renderTmiList();renderCategories();
}
async function deleteTmi(id){if(!confirm('确定删除？'))return;try{await apiDelete('/api/tmis/'+id);ALL_TMIS=ALL_TMIS.filter(function(x){return x.id!=id;});status('已删除');}catch(e){status('删除失败：'+e.message);}renderTmiList();renderStats();renderCategories();}
async function newTmi(){try{var cats=JSON.stringify(['性格习惯']);var resp=await apiPost('/api/tmis',{idol_id:1,content:'',category:'性格习惯',categories:cats,quote:''});var t={id:resp.id,content:'',category:'性格习惯',categories:cats,quote:'',post_url:'',post_date:''};ALL_TMIS.unshift(t);status('新 TMI 已创建');}catch(e){status('创建失败：'+e.message);return;}renderTmiList();renderStats();renderCategories();setTimeout(function(){editTmi(ALL_TMIS[0].id);},50);}

// ── Counseling ──
function renderCounselingCard(c,editing,idx,total){
  if(editing){return'<div class="card editing" data-counseling-id="'+c.id+'"><textarea id="cect_'+c.id+'">'+escHtml(c.content)+'</textarea><input id="ceqt_'+c.id+'" value="'+escAttr(c.quote||'')+'" placeholder="引用原句（可选）"/><div class="edit-btns"><button class="btn-save" onclick="saveCounseling(\''+c.id+'\')">保存</button><button class="btn-cancel" onclick="cancelEditCounseling(\''+c.id+'\')">取消</button></div></div>';}
  var adm=isAdmin?'<div class="admin-actions"><button onclick="editCounseling(\''+c.id+'\')">E</button><button class="danger" onclick="deleteCounseling(\''+c.id+'\')">D</button></div>':'';
  return'<div class="card card-green'+spanClass(idx,total)+'" data-counseling-id="'+c.id+'"><span class="badge counseling">商谈</span><div class="content" style="margin-top:6px">'+escHtml(c.content)+'</div>'+(c.quote?'<div class="card-overlay"><div>'+escHtml(c.quote)+'</div></div>':'')+adm+'</div>';
}
function renderCounselingList(){
  var list=document.getElementById('counselingList');if(loading){list.innerHTML='<span class="loading-text">LOADING...</span>';return;}
  var items=getFilteredCounselings();if(!items.length){list.innerHTML='<span class="empty-text">暂无烦恼商谈</span>';return;}
  var tp=Math.ceil(items.length/PAGE_SIZE);if(counselingPage>tp)counselingPage=tp;
  var pi=items.slice((counselingPage-1)*PAGE_SIZE,counselingPage*PAGE_SIZE);
  var h='';for(var i=0;i<pi.length;i++)h+=renderCounselingCard(pi[i],false,i,pi.length);
  list.innerHTML=h;
  var pagEl=document.getElementById('counselingPagination');
  if(tp>1){pagEl.innerHTML='<div class="pagination"><button'+(counselingPage<=1?' disabled':'')+' onclick="changeCounselingPage('+(counselingPage-1)+')">&larr; PREV</button><span class="page-info">PAGE <span class="page-num">'+counselingPage+'</span> / '+tp+' &nbsp;('+items.length+' items)</span><button'+(counselingPage>=tp?' disabled':'')+' onclick="changeCounselingPage('+(counselingPage+1)+')">NEXT &rarr;</button></div>';pagEl.style.display='';}
  else pagEl.style.display='none';
  document.getElementById('addCounselingBtn').style.display=isAdmin?'block':'none';
}
function changeCounselingPage(n){counselingPage=n;renderCounselingList();window.scrollTo({top:0,behavior:'smooth'});}
function editCounseling(id){var c=ALL_COUNSELINGS.find(function(x){return x.id==id;});if(!c)return;document.querySelector('.card[data-counseling-id="'+id+'"]').outerHTML=renderCounselingCard(c,true,0,1);}
function cancelEditCounseling(id){var c=ALL_COUNSELINGS.find(function(x){return x.id==id;});if(!c)return;var el=document.querySelector('.card.editing[data-counseling-id="'+id+'"]');if(!el)return;var idx=Array.from(el.parentNode.children).indexOf(el);el.outerHTML=renderCounselingCard(c,false,idx,el.parentNode.children.length);}
async function saveCounseling(id){var content=document.getElementById('cect_'+id).value,quote=document.getElementById('ceqt_'+id).value;try{await apiPut('/api/counselings/'+id,{content:content,quote:quote});var c=ALL_COUNSELINGS.find(function(x){return x.id==id;});if(c){c.content=content;c.quote=quote;}status('已保存');}catch(e){status('保存失败：'+e.message);}renderCounselingList();}
async function deleteCounseling(id){if(!confirm('确定删除？'))return;try{await apiDelete('/api/counselings/'+id);ALL_COUNSELINGS=ALL_COUNSELINGS.filter(function(x){return x.id!=id;});status('已删除');}catch(e){status('删除失败：'+e.message);}renderCounselingList();renderStats();}
async function newCounseling(){try{var resp=await apiPost('/api/counselings',{idol_id:1,content:'',quote:''});var c={id:resp.id,content:'',quote:'',post_url:'',post_date:''};ALL_COUNSELINGS.unshift(c);status('已创建');}catch(e){status('创建失败：'+e.message);return;}renderCounselingList();renderStats();setTimeout(function(){editCounseling(ALL_COUNSELINGS[0].id);},50);}

// ── Search ──
function doSearch(){var q=document.getElementById('searchInput').value.trim();if(!q){tmiSearch=null;counselingSearch=null;tmiFilter=null;}else{tmiSearch=q;counselingSearch=q;tmiFilter=null;}document.querySelectorAll('.filter-tab').forEach(function(t){t.classList.remove('active');});if(!q){var f=document.querySelector('.filter-tab');if(f)f.classList.add('active');}tmiPage=1;counselingPage=1;renderTmiList();renderCounselingList();}
function filterTMI(cat){tmiFilter=cat;tmiSearch=null;document.getElementById('searchInput').value='';var tabs=document.querySelectorAll('.filter-tab');for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');if(cat)event.target.classList.add('active');else{var f=document.querySelector('.filter-tab');if(f)f.classList.add('active');}tmiPage=1;renderTmiList();}

// ── Schedules ──
function renderTimeline(){var tl=document.getElementById('timeline');if(loading){tl.innerHTML='<span class="loading-text">LOADING...</span>';return;}if(!ALL_SCHEDULES.length){tl.innerHTML='<span class="empty-text">暂无行程</span>';return;}tl.innerHTML=ALL_SCHEDULES.map(function(s){return'<div class="timeline-card"><div class="tl-date">'+escHtml(s.start_date||'')+(s.end_date?' ~ '+escHtml(s.end_date):'')+'</div><div class="tl-title">['+escHtml(s.event_type||'')+'] '+escHtml(s.title||'')+'</div>'+(s.location?'<div class="tl-detail">'+escHtml(s.location)+'</div>':'')+(s.description?'<div class="tl-detail">'+escHtml(s.description)+'</div>':'')+'</div>';}).join('');}

// ── Admin ──
function toggleAdminMode(){
  if(isAdmin){isAdmin=false;document.getElementById('navAdmin').classList.remove('active');document.body.classList.remove('admin-show');}
  else{var pw=prompt('请输入管理密码 / PASSWORD');if(pw!==ADMIN_PASSWORD){alert('密码错误');return;}isAdmin=true;document.getElementById('navAdmin').classList.add('active');document.body.classList.add('admin-show');}
  renderAll();
}

// ── Export ──
function exportData(){var blob=new Blob([JSON.stringify({tmis:ALL_TMIS,counselings:ALL_COUNSELINGS,schedules:ALL_SCHEDULES},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jellyhooish_data.json';a.click();}

// ── Init ──
function renderAll(){renderStats();renderCategories();renderTmiList();renderCounselingList();renderTimeline();}
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
loadAllData();
</script>
